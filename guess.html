<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="guess.css" type="text/css">
        <title>
            Guessing Game
        </title>
    </head>
    <body id="body">
        <header>
            <h2 onClick="reset()">Again!</h2>
            <p>(Between 1 and 20)</p>
        </header>
        
        <h2 id="guessit">Guess my number</h2>
        <div id="line">
            <p id="mark">?</p>
        </div>
        <div id="garea">
            <div id="gspace">
                <input type="number" id="nn" min="1" max="20"><br />
                <button id="guess" class="fontsize" onClick="checkguess()">Guess</button>
            </div>

            <div id= "sspace">
                <p id="check"></p>
                <div class="shflex">
                    <p id="score" class="fontsize">Score: </p>
                    <p id="scoredis" class="fontsize">20</p>
                </div>
                <div class="shflex">
                    <p id="highscore" class="fontsize">High Score: </p>
                    <p id="hsdis" class="fontsize"></p>
                </div>
            </div>
            <div class="clr"></div>
        </div>
        
        
        <script src="guess.js" type="text/javascript"></script>
    </body>
</html>
